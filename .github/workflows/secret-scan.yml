name: Secret Scan

on:
  pull_request:
  push:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Scan repository for committed secrets
        run: python scripts/check_no_secrets.py
