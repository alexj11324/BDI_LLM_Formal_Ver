name: BDI Verifier CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Use project metadata as source of truth for test dependencies.
        # requirements.txt is intentionally minimal in this repository.
        pip install -e ".[dev]"

    - name: Lint and format check (ruff)
      run: |
        ruff check .
        ruff format --check .

    - name: Run Tests
      env:
        # We explicitly do NOT set API keys here to ensure offline tests run
        # and online tests are skipped
        PYTHONPATH: src
      run: |
        pytest -v tests/
